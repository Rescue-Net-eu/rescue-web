name: Mobile

on:
  push:
    branches: [main]
    paths: ["apps/mobile/**", ".github/workflows/mobile.yml"]
  pull_request:
    paths: ["apps/mobile/**", ".github/workflows/mobile.yml"]

defaults:
  run:
    working-directory: apps/mobile

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Tests
        run: flutter test
