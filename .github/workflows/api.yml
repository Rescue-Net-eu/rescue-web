name: API

on:
  push:
    branches: [main]
    paths: ["services/api/**", ".github/workflows/api.yml"]
  pull_request:
    paths: ["services/api/**", ".github/workflows/api.yml"]

defaults:
  run:
    working-directory: services/api

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: rescuenet
          POSTGRES_PASSWORD: rescuenet
          POSTGRES_DB: rescuenet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rescuenet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://rescuenet:rescuenet@localhost:5432/rescuenet_test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Run migrations
        run: alembic upgrade head
      - name: Tests (pytest)
        run: pytest -q
